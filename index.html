<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кейс · стратегический аудит</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    /* ========== СТИЛИ (полностью идентичны предыдущей версии) ========== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f0f3f7;
      color: #1e293b;
      padding: 20px;
    }
    .client-card {
      max-width: 1100px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 35px -10px rgba(0,20,40,0.15);
      padding: 32px 28px;
    }
    @media (max-width: 640px) {
      body { padding: 12px; }
      .client-card { padding: 24px 18px; }
    }

    .client-info {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-weight: 500;
      color: #1e3a5f;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 20px;
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #0f172a;
    }

    .progress-badge {
      background: #eef2f6;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #1e3a5f;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .progress-badge .dot {
      width: 10px;
      height: 10px;
      border-radius: 10px;
      background: #1d4ed8;
    }

    .responsible-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .responsible-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .responsible-icon {
      font-size: 1.4rem;
      line-height: 1;
    }
    .responsible-name {
      font-weight: 600;
      font-size: 1rem;
      color: #0f2b45;
      white-space: nowrap;
    }
    .responsible-phone {
      font-size: 0.9rem;
      color: #2563eb;
      text-decoration: none;
      margin-left: calc(1.4rem + 8px);
      margin-top: 2px;
    }

    .progress-horizontal {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      position: relative;
      padding: 8px 0;
    }
    .progress-horizontal::before {
      content: '';
      position: absolute;
      top: 38px;
      left: 40px;
      right: 40px;
      height: 3px;
      background: linear-gradient(90deg, #d0dbea, #a6b8cf);
      border-radius: 6px;
      z-index: 0;
    }
    .step-h {
      position: relative;
      z-index: 2;
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background: transparent;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .step-h.active {
      background: #f5faff;
      box-shadow: 0 8px 22px -14px #1d4ed850, 0 0 0 1px #cddfff inset;
    }
    .circle {
      width: 52px;
      height: 52px;
      border-radius: 52px;
      background: white;
      border: 2.5px solid #d8e0e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.3rem;
      color: #405571;
      margin-bottom: 10px;
      box-shadow: 0 6px 12px -6px rgba(0,32,64,0.08);
    }
    .completed .circle { background: #0f6e4a; border-color: #0f6e4a; color: white; }
    .active .circle   { background: #1d4ed8; border-color: #1d4ed8; color: white; }
    .pending .circle  { background: #ffffff; border-color: #9aaec5; color: #2b3f5c; }

    .label {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 4px;
      color: #1f2a41;
      padding: 0 4px;
    }
    .status {
      font-size: 0.8rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 30px;
      background: #f1f4f9;
      color: #43566e;
      display: inline-block;
      margin-bottom: 8px;
    }
    .completed .status { background: #e0f2e9; color: #0b5e42; }
    .active .status    { background: #e2edff; color: #1d4ed8; font-weight: 600; }
    .pending .status   { background: #f1f4f9; color: #5f6f84; }

    .step-description {
      font-size: 0.85rem;
      color: #2b4058;
      background: #ffffff;
      padding: 10px 12px;
      border-radius: 16px;
      margin: 8px 12px 12px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      border: 1px solid #e4ecf7;
      width: calc(100% - 24px);
      text-align: left;
    }
    .step-description .eta {
      margin-top: 6px;
      font-weight: 500;
      color: #0047ab;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .step-h:not(.active) .step-description {
      display: none;
    }

    .progress-horizontal.scrollable {
      overflow-x: auto;
      padding-bottom: 12px;
      scrollbar-width: thin;
    }
    .progress-horizontal.scrollable .step-h {
      flex: 0 0 180px;
    }

    .progress-vertical {
      display: none;
      flex-direction: column;
      position: relative;
      padding-left: 38px;
    }
    .progress-vertical::before {
      content: '';
      position: absolute;
      left: 20px;
      top: 18px;
      bottom: 18px;
      width: 3px;
      background: linear-gradient(to bottom, #d0dbea, #a6b8cf);
      border-radius: 6px;
    }
    .step-v {
      position: relative;
      margin-bottom: 32px;
    }
    .step-v .circle {
      position: absolute;
      left: -38px;
      top: 0;
      width: 44px;
      height: 44px;
      font-size: 1.1rem;
      border-width: 2px;
      margin: 0;
    }
    .step-v .content {
      background: #ffffff;
      border-radius: 18px;
      padding: 18px 18px 18px 24px;
      box-shadow: 0 6px 18px -10px #14243330, 0 0 0 1px #eef4fa inset;
    }
    .step-v .label {
      font-size: 1.15rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .step-v .details-text {
      font-size: 0.9rem;
      color: #365073;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed #cbd5e2;
    }
    .active .content { background: #f5faff; }

    @media (min-width: 769px) {
      .progress-horizontal { display: flex; }
      .progress-vertical { display: none; }
    }
    @media (max-width: 768px) {
      .progress-horizontal { display: none; }
      .progress-vertical { display: flex; }
      .header-row { flex-direction: column; align-items: flex-start; }
      .responsible-block { align-self: flex-end; }
    }

    .info-hint {
      margin-top: 20px;
      color: #7f8fa3;
      text-align: center;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="client-card" id="clientCard">
  <!-- Клиент слева сверху -->
  <div class="client-info">
    💼 <span id="clientNameDisplay">Концедалов С.И.</span>
  </div>

  <!-- Строка с заголовком и индикатором прогресса -->
  <div class="header-row">
    <h1 id="caseNameDisplay">Кейс: Стратегический аудит ситуации и выбор модели исполнения обязательств</h1>
    <div class="progress-badge" id="progressBadge">
      <span class="dot"></span> <span id="progressText">2 из 7 этапов</span>
    </div>
  </div>

  <!-- Блок ответственного -->
  <div class="responsible-block" id="responsibleBlock" style="margin-bottom: 30px;">
    <div class="responsible-row">
      <span class="responsible-icon">🎓</span>
      <span class="responsible-name" id="responsibleNameDisplay">Иван Петров, клиентский менеджер</span>
    </div>
    <div class="responsible-phone" id="responsiblePhoneDisplay">+7 (999) 123-45-67</div>
  </div>

  <!-- Горизонтальный прогресс (десктоп) -->
  <div class="progress-horizontal" id="progressHorizontal"></div>

  <!-- Вертикальный прогресс (мобильный) -->
  <div class="progress-vertical" id="progressVertical"></div>
  <div class="info-hint">📋 Данные обновляются автоматически</div>
</div>

<script>
  (function() {
    // ====== НАСТРОЙКИ JSONBIN.IO (ваши данные) ======
    const BIN_ID = '69a5c886ae596e708f586c95';
    const API_KEY = '$2a$10$04rxd6FFWKwU6F5lh7rxfepeHDiMl50NHzePfFIwq71to/inJGDgW';
    const BASE_URL = 'https://api.jsonbin.io/v3/b';

    // ====== НОВЫЕ ДАННЫЕ ПО КЕЙСУ ======
    const defaultData = {
      caseName: 'Стратегический аудит ситуации и выбор модели исполнения обязательств',
      clientName: 'Концедалов С.И.',
      responsible: {
        name: 'Иван Петров',
        position: 'клиентский менеджер',
        phone: '+7 (999) 123-45-67'
      },
      stages: [
        {
          id: 0,
          title: 'Брифинг и анализ задачи',
          description: 'Клиентский менеджер уточняет основные моменты задачи и ожидания по результату.',
          estimatedTime: '1 день',
          summary: 'Проведён первичный бриф, зафиксированы цели.',
          nextActions: 'Ожидайте коммерческое предложение.',
          status: 'completed'
        },
        {
          id: 1,
          title: 'Подготовка коммерческого предложения',
          description: 'Менеджер готовит КП на основе брифа, берёт тайм-аут.',
          estimatedTime: '2 дня',
          summary: 'КП подготовлено и направлено клиенту.',
          nextActions: 'Рассмотрите предложение и дайте обратную связь.',
          status: 'completed'
        },
        {
          id: 2,
          title: 'Согласование и оплата',
          description: 'Подписание соглашения, фиксация договорённостей, внесение установочного платежа или ретейнера.',
          estimatedTime: '3 дня',
          summary: 'Договор подписан, оплата поступила.',
          nextActions: 'После оплаты передайте документы и информацию.',
          status: 'active'  // текущий этап
        },
        {
          id: 3,
          title: 'Передача информации',
          description: 'Клиент предоставляет необходимые документы, даёт пояснения.',
          estimatedTime: '2 дня',
          summary: 'Все материалы получены.',
          nextActions: '👉 Передайте документы и пояснения эксперту.',
          status: 'pending'
        },
        {
          id: 4,
          title: 'Экспертный анализ',
          description: 'Эксперт изучает материалы, при необходимости задаёт уточняющие вопросы.',
          estimatedTime: '5–7 дней',
          summary: 'Анализ завершён, подготовлены выводы.',
          nextActions: 'Эксперт свяжется для уточнений.',
          status: 'pending'
        },
        {
          id: 5,
          title: 'Презентация результатов',
          description: 'Эксперт представляет итоги анализа, модели поведения, рекомендованный вариант, передаёт письменный отчёт.',
          estimatedTime: '1 день',
          summary: 'Презентация проведена, отчёт передан.',
          nextActions: 'Ознакомьтесь с результатами, подготовьте вопросы.',
          status: 'pending'
        },
        {
          id: 6,
          title: 'Обратная связь',
          description: 'Клиентский менеджер уточняет удовлетворённость работой эксперта и готовность к реализации.',
          estimatedTime: '1 день',
          summary: 'Обратная связь получена, определены следующие шаги.',
          nextActions: 'Сообщите ваши впечатления и планы.',
          status: 'pending'
        }
      ]
    };

    // Загрузка данных из облака (если доступно, иначе defaultData)
    async function loadData() {
      try {
        const response = await fetch(`${BASE_URL}/${BIN_ID}/latest`, {
          headers: { 'X-Master-Key': API_KEY }
        });
        if (!response.ok) throw new Error('Ошибка загрузки');
        const result = await response.json();
        return result.record;
      } catch (error) {
        console.warn('Не удалось загрузить из jsonbin, используем defaultData');
        return defaultData;
      }
    }

    function getStatusText(status) {
      if (status === 'completed') return 'Завершено';
      if (status === 'active') return 'В работе';
      return 'Ожидает';
    }

    // Функция для форматирования текста описания с иконкой в зависимости от статуса
    function getDescriptionWithIcon(stage) {
      if (stage.status === 'active') {
        return { icon: '⏳', text: stage.description || '', class: 'active-desc' };
      } else if (stage.status === 'pending') {
        return { icon: '👉', text: stage.nextActions || '', class: 'pending-desc' };
      } else {
        return { icon: '✅', text: stage.summary || '', class: 'completed-desc' };
      }
    }

    // Функция отрисовки
    function render(data) {
      // Клиент
      document.getElementById('clientNameDisplay').innerText = data.clientName;
      document.getElementById('caseNameDisplay').innerText = 'Кейс: ' + data.caseName;

      // Прогресс: сколько завершено и общее количество
      const total = data.stages.length;
      const completedCount = data.stages.filter(s => s.status === 'completed').length;
      const activeStage = data.stages.find(s => s.status === 'active');
      let progressText = '';
      if (activeStage) {
        const activeIndex = data.stages.findIndex(s => s.status === 'active') + 1;
        progressText = `⏳ Этап ${activeIndex} из ${total}: ${activeStage.title}`;
      } else {
        progressText = `${completedCount} из ${total} этапов завершено`;
      }
      document.getElementById('progressText').innerText = progressText;

      // Ответственный
      const resp = data.responsible || { name: '', position: '', phone: '' };
      const namePart = resp.name || '';
      const positionPart = resp.position ? `, ${resp.position}` : '';
      const fullName = namePart + positionPart;

      const nameEl = document.getElementById('responsibleNameDisplay');
      const phoneEl = document.getElementById('responsiblePhoneDisplay');
      const iconRow = document.querySelector('.responsible-row');

      if (namePart) {
        nameEl.innerText = fullName;
        nameEl.style.display = 'inline';
        iconRow.style.display = 'flex';
      } else {
        iconRow.style.display = 'none';
      }

      if (resp.phone) {
        phoneEl.innerText = resp.phone;
        phoneEl.style.display = 'block';
      } else {
        phoneEl.style.display = 'none';
      }

      // --- Горизонтальный прогресс ---
      const horizContainer = document.getElementById('progressHorizontal');
      horizContainer.innerHTML = '';
      data.stages.forEach(stage => {
        const stepDiv = document.createElement('div');
        stepDiv.className = `step-h ${stage.status}`;
        stepDiv.dataset.step = stage.id;

        let inner = `
          <div class="circle">${stage.id + 1}</div>
          <div class="label">${stage.title}</div>
          <div class="status">${getStatusText(stage.status)}</div>
        `;

        // Для активного этапа добавляем описание с иконкой
        if (stage.status === 'active') {
          const desc = getDescriptionWithIcon(stage);
          let etaHtml = stage.estimatedTime ? `<div class="eta">⏱️ ${stage.estimatedTime}</div>` : '';
          inner += `
            <div class="step-description">
              <div><span style="font-weight: 600;">${desc.icon}</span> ${desc.text}</div>
              ${etaHtml}
            </div>
          `;
        }

        stepDiv.innerHTML = inner;
        horizContainer.appendChild(stepDiv);
      });

      if (data.stages.length >= 6) {
        horizContainer.classList.add('scrollable');
      } else {
        horizContainer.classList.remove('scrollable');
      }

      // --- Вертикальный прогресс ---
      const vertContainer = document.getElementById('progressVertical');
      vertContainer.innerHTML = '';
      data.stages.forEach(stage => {
        const desc = getDescriptionWithIcon(stage);
        let detailsText = desc.icon + ' ' + desc.text;
        if (stage.status === 'active' && stage.estimatedTime) {
          detailsText += `\n⏱️ ${stage.estimatedTime}`;
        }

        const stepDiv = document.createElement('div');
        stepDiv.className = `step-v ${stage.status}`;
        stepDiv.dataset.step = stage.id;
        stepDiv.innerHTML = `
          <div class="circle">${stage.id + 1}</div>
          <div class="content">
            <div class="label">${stage.title} <span class="status">${getStatusText(stage.status)}</span></div>
            <div class="details-text">${detailsText.replace(/\n/g, '<br>')}</div>
          </div>
        `;
        vertContainer.appendChild(stepDiv);
      });
    }

    // Функция загрузки и обновления
    async function fetchAndRender() {
      const data = await loadData();
      render(data);
    }

    // Первый запуск
    fetchAndRender();
    // Обновление каждые 5 минут
    setInterval(fetchAndRender, 300000); // 300000 мс = 5 минут
  })();
</script>
</body>
</html>
