<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emelin.Pro · Прогресс по кейсу</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ========== СТИЛИ (полностью идентичны предыдущей версии) ========== */
    :root {
      --primary: #1BA1FA;
      --primary-dark: #0B7FD4;
      --primary-light: #E8F5FE;
      --primary-glow: rgba(27, 161, 250, 0.15);
      --green: #10B981;
      --green-light: #ECFDF5;
      --green-dark: #059669;
      --amber: #F59E0B;
      --surface: #FFFFFF;
      --bg: #F3F6FA;
      --bg-subtle: #EDF1F7;
      --text-primary: #0F1729;
      --text-secondary: #4B5C72;
      --text-muted: #8896A8;
      --border: #E2E8F0;
      --border-light: #F0F4F8;
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --radius-xl: 36px;
      --shadow-sm: 0 1px 3px rgba(0,20,50,0.04);
      --shadow-md: 0 8px 24px -8px rgba(0,20,50,0.08);
      --shadow-lg: 0 20px 40px -12px rgba(0,20,50,0.12);
      --shadow-glow: 0 0 0 4px var(--primary-glow);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .brand-bar {
      max-width: 1200px;
      margin: 0 auto 20px;
      padding: 0 4px;
      animation: fadeDown 0.5s ease-out;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-logo img {
      height: 32px;
      width: auto;
      max-width: 200px;
    }

    .brand-logo-text {
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.03em;
      color: var(--primary);
    }

    .brand-logo-text span { color: var(--text-muted); font-weight: 600; }

    .case-card {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      animation: fadeUp 0.6s ease-out;
      position: relative;
    }

    .case-sticky-header {
      padding: 32px 32px 0;
      transition: box-shadow 0.25s, padding 0.25s;
      background: var(--surface);
      z-index: 10;
    }

    .case-sticky-header.is-sticky { position: sticky; top: 0; }
    .case-sticky-header.stuck { padding: 16px 32px; box-shadow: 0 4px 20px -4px rgba(0,20,50,0.1); border-bottom: 1px solid var(--border-light); }

    .client-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--primary-dark);
      background: var(--primary-light);
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 14px;
      letter-spacing: 0.01em;
    }

    .case-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .header-top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .case-title {
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1.25;
      transition: font-size 0.25s;
    }

    .coordinator-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .coordinator-toggle:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    .coordinator-toggle svg { width: 15px; height: 15px; flex-shrink: 0; }
    .coordinator-toggle .chevron { width: 12px; height: 12px; transition: transform 0.25s; margin-left: 2px; }
    .coordinator-toggle.open .chevron { transform: rotate(180deg); }

    .coordinator-dropdown {
      display: none;
      margin-top: 12px;
      padding: 16px 20px;
      background: var(--bg);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      animation: slideDown 0.25s ease-out;
    }
    .coordinator-dropdown.visible { display: block; }

    .coordinator-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .coordinator-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #50C3FF);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      flex-shrink: 0;
      overflow: hidden;
    }

    .coordinator-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .coordinator-info { display: flex; flex-direction: column; }
    .coordinator-name { font-weight: 700; font-size: 0.95rem; color: var(--text-primary); }
    .coordinator-role { font-size: 0.78rem; color: var(--text-muted); }

    .coordinator-contacts { display: flex; gap: 8px; flex-wrap: wrap; }

    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      background: var(--surface);
    }

    .contact-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    .contact-btn svg { width: 14px; height: 14px; }

    .contact-icon-btn { display: none; }

    .progress-overview {
      margin: 28px 32px 0;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: margin 0.25s;
    }

    .progress-percent {
      font-family: 'Manrope', system-ui, sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .progress-label { font-size: 0.85rem; font-weight: 600; color: var(--text-primary); }

    .progress-track {
      margin: 20px 32px 0;
      height: 6px;
      background: var(--bg-subtle);
      border-radius: 100px;
      overflow: hidden;
      transition: margin 0.25s;
    }

    .progress-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--green), var(--primary));
      transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .stages-section { padding: 28px 32px 32px; }

    /* Desktop horizontal */
    .stages-horizontal {
      display: flex;
      gap: 10px;
    }

    .stage-card-h {
      flex: 1 1 0;
      min-width: 0;
      border-radius: var(--radius-md);
      padding: 20px 16px 16px;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 2px solid transparent;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .stage-card-h:hover {
      border-color: var(--border);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .stage-card-h.active {
      background: var(--primary-light);
      border-color: var(--primary);
      box-shadow: var(--shadow-glow);
      transform: translateY(-2px);
    }

    .stage-number {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .completed .stage-number { background: var(--green); color: white; }
    .active .stage-number { background: var(--primary); color: white; box-shadow: 0 4px 12px -2px rgba(27,161,250,0.4); }
    .pending .stage-number { background: var(--border); color: var(--text-muted); }

    .stage-title-h {
      font-weight: 700;
      font-size: 0.92rem;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .stage-status-badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 8px;
      align-self: flex-start;
    }

    .completed .stage-status-badge { background: rgba(16,185,129,0.15); color: var(--green-dark); }
    .active .stage-status-badge { background: rgba(27,161,250,0.15); color: var(--primary-dark); }
    .pending .stage-status-badge { background: var(--border-light); color: var(--text-muted); }

    .stage-details-h {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(0,0,0,0.06);
      font-size: 0.83rem;
      color: var(--text-secondary);
      line-height: 1.5;
      flex-grow: 1;
    }
    
    /* Стили для форматированного текста */
    .stage-details-h ul, .stage-details-h ol {
      padding-left: 20px;
      margin: 8px 0;
    }
    .stage-details-h li {
      margin-bottom: 4px;
    }
    .stage-details-h strong {
      font-weight: 700;
      color: var(--text-primary);
    }
    .stage-details-h em {
      font-style: italic;
    }

    .stage-footer-h {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .date-info {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 600;
      font-size: 0.8rem;
    }

    .date-info svg { width: 14px; height: 14px; flex-shrink: 0; }

    .manager-comment {
      margin-top: 0px;
      padding: 10px 14px;
      background: rgba(27,161,250,0.06);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--primary);
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    
    .manager-comment ul, .manager-comment ol {
      padding-left: 20px;
      margin: 8px 0;
    }

    .manager-comment-label {
      font-weight: 700; color: var(--primary-dark);
      font-size: 0.72rem; text-transform: uppercase;
      letter-spacing: 0.04em; margin-bottom: 3px;
    }

    .materials-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--primary-light);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--primary-dark);
      text-decoration: none;
      border: 1px solid var(--primary);
      align-self: flex-end;
    }
    .materials-link:hover { background: var(--primary); color: white; }

    /* Vertical stages */
    .stages-vertical {
      display: none;
      flex-direction: column;
      position: relative;
      padding-left: 44px;
    }

    .stages-vertical::before {
      content: '';
      position: absolute;
      left: 21px; top: 24px; bottom: 24px;
      width: 2px;
      background: var(--border);
      border-radius: 2px;
    }

    .stage-v { position: relative; padding: 12px 0; }

    .stage-v .stage-number {
      position: absolute;
      left: -44px; top: 12px;
      width: 42px; height: 42px;
      font-size: 0.95rem; z-index: 2;
    }

    .stage-v-body {
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.25s;
    }

    .stage-v.active .stage-v-body {
      background: var(--primary-light);
      border-color: var(--primary);
      box-shadow: var(--shadow-glow);
    }

    .stage-v.pending .stage-v-body { background: var(--bg); }

    .stage-v-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .stage-v-title { font-weight: 700; font-size: 1.05rem; order: 2; }
    .stage-v-header .stage-status-badge { order: 1; }

    .stage-v-details {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px dashed rgba(0,0,0,0.08);
      font-size: 0.88rem; color: var(--text-secondary);
      line-height: 1.55; display: block;
    }
    
    .stage-v-details ul, .stage-v-details ol {
      padding-left: 20px;
      margin: 8px 0;
    }

    .stage-v-footer {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .case-footer {
      padding: 0 32px 28px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
    }

    .footer-update {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; color: var(--text-muted);
    }

    .update-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .contact-btn { display: none; }
      .contact-icon-btn {
        display: flex;
        align-items: center; justify-content: center;
        width: 40px; height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-secondary);
        text-decoration: none;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .contact-icon-btn:hover,
      .contact-icon-btn:active {
        border-color: var(--primary);
        color: var(--primary);
        background: var(--primary-light);
      }
      .contact-icon-btn svg { width: 18px; height: 18px; }
      .coordinator-contacts { gap: 10px; }
    }

    @media (min-width: 769px) {
      .stages-horizontal { display: flex; }
      .stages-vertical { display: none; }
    }

    @media (max-width: 768px) {
      body { padding: 12px 8px; }
      .brand-bar { margin-bottom: 12px; }
      .stages-horizontal { display: none; }
      .stages-vertical { display: flex; }
      .case-sticky-header { padding: 24px 20px 0; }
      .case-sticky-header.stuck { padding: 12px 20px; }
      .progress-overview { margin: 20px 20px 0; }
      .progress-track { margin: 16px 20px 0; }
      .stages-section { padding: 24px 20px 24px; }
      .case-footer { padding: 0 20px 24px; }
      .header-top-row { flex-direction: column; }
      .case-title { font-size: 1.3rem; }
      .progress-percent { font-size: 1.8rem; }
    }

    @media (max-width: 420px) {
      .case-card { border-radius: var(--radius-lg); }
    }

    /* Scrollable */
    .stages-horizontal.scrollable {
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .stages-horizontal.scrollable .stage-card-h { flex: 0 0 240px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes stageEnter { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .stage-animate { animation: stageEnter 0.4s ease-out both; }

    .flash-update { animation: flashBorder 1.5s ease-out; }
    @keyframes flashBorder {
      0% { box-shadow: 0 0 0 0 rgba(27,161,250,0.5); }
      70% { box-shadow: 0 0 0 8px rgba(27,161,250,0); }
      100% { box-shadow: none; }
    }

    /* Сообщение об ошибке */
    .error-message {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px 20px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      text-align: center;
      color: var(--text-secondary);
    }
    
    .error-message h2 {
      color: var(--text-primary);
      margin-bottom: 16px;
    }
    
    .error-message a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    
    .error-message a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="brand-bar">
  <a href="#" class="brand-logo">
    <img src="https://i127.fastpic.org/big/2026/0305/f0/6ae5fa7d2cd11672b3195a7cda0a8cf0.png" alt="Emelin.Pro" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
    <div class="brand-logo-text" style="display:none;">EMELIN<span>.PRO</span></div>
  </a>
</div>

<div class="case-card" id="caseCard">

  <div class="case-sticky-header" id="stickyHeader">
    <div class="client-tag">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
      <span id="clientNameDisplay">—</span>
    </div>

    <div class="case-label">КЕЙС</div>

    <div class="header-top-row">
      <h1 class="case-title" id="caseTitleDisplay">—</h1>

      <div class="coordinator-toggle" id="coordToggle" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Куратор</span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </div>

    <div class="coordinator-dropdown" id="coordDropdown">
      <div class="coordinator-top">
        <div class="coordinator-avatar" id="coordAvatar">—</div>
        <div class="coordinator-info">
          <div class="coordinator-name" id="coordName">—</div>
          <div class="coordinator-role" id="coordRole"></div>
        </div>
      </div>
      <div class="coordinator-contacts" id="coordContacts"></div>
    </div>

    <div class="progress-overview">
      <div class="progress-percent" id="progressPercent">0%</div>
      <div class="progress-label" id="progressLabel">—</div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="stages-section">
    <div class="stages-horizontal" id="stagesH"></div>
    <div class="stages-vertical" id="stagesV"></div>
  </div>

  <div class="case-footer">
    <div class="footer-update">
      <div class="update-dot"></div>
      <span id="updateTime">Загрузка…</span>
    </div>
  </div>

</div>

<!-- Контейнер для сообщения об ошибке (скрыт по умолчанию) -->
<div id="errorContainer" style="display: none;">
  <div class="error-message">
    <h2>Кейс не найден</h2>
    <p>Проверьте ссылку или обратитесь к вашему менеджеру.</p>
    <p><a href="#" onclick="location.reload()">Попробовать снова</a></p>
  </div>
</div>

<script>
(function() {
  // ===== ПОЛУЧАЕМ ID ИЗ URL =====
  const urlParams = new URLSearchParams(window.location.search);
  const BIN_ID = urlParams.get('id');
  
  // Используем ID из URL 
  const ACTUAL_BIN_ID = BIN_ID;
  
  const API_KEY = '$2a$10$YvnYK1Cpzh4XADw4YOLGzON7/XE0yY3PywOinHRc9HVOkwXjuosny';
  const BASE_URL = 'https://api.jsonbin.io/v3/b';

  let previewData = null;
  if (window.location.search.includes('preview')) {
    const stored = localStorage.getItem('previewData');
    if (stored) {
      try { previewData = JSON.parse(stored); } catch(e) {}
    }
  }


  let lastDataHash = '';

  async function loadData() {
    // Если есть previewData, возвращаем его
    if (previewData) return previewData;
    
    // Если ID не указан, используем дефолтный (но предупреждаем)
    if (!BIN_ID) {
      console.warn('Параметр id не указан в URL. Используется кейс по умолчанию.');
    }
    
    try {
      const r = await fetch(`${BASE_URL}/${ACTUAL_BIN_ID}/latest`, { 
        headers: { 'X-Access-Key': API_KEY } 
      });
      
      if (!r.ok) {
        if (r.status === 404 || r.status === 400) {
          throw new Error('BIN_NOT_FOUND');
        }
        throw new Error('FETCH_ERROR');
      }
      
      return (await r.json()).record;
    } catch(e) {
      console.error('Ошибка загрузки данных:', e);
      
      // Показываем сообщение об ошибке пользователю
      const caseCard = document.getElementById('caseCard');
      const errorContainer = document.getElementById('errorContainer');
      
      if (caseCard) caseCard.style.display = 'none';
      if (errorContainer) {
        errorContainer.style.display = 'block';
        
        // Настраиваем текст в зависимости от ошибки
        const errorTitle = errorContainer.querySelector('h2');
        const errorText = errorContainer.querySelector('p');
        
        if (e.message === 'BIN_NOT_FOUND') {
          if (errorTitle) errorTitle.textContent = 'Кейс не найден';
          if (errorText) errorText.textContent = 'Кейс с указанным ID не существует. Проверьте ссылку.';
        } else {
          if (errorTitle) errorTitle.textContent = 'Ошибка загрузки';
          if (errorText) errorText.textContent = 'Не удалось загрузить данные. Попробуйте позже.';
        }
      }
      
      // Возвращаем null, чтобы рендер не выполнялся
      return null;
    }
  }

  function statusText(s) {
    if (s === 'completed') return 'Завершено';
    if (s === 'active') return 'В работе';
    return 'Предстоит';
  }

  function getInitials(n) { return n ? n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?'; }

  function countWorkingDays(start, end) {
    if (!start || !end) return null;
    const startDate = new Date(start + 'T00:00:00');
    const endDate = new Date(end + 'T23:59:59');
    if (startDate > endDate) return 0;
    let count = 0;
    const current = new Date(startDate);
    while (current <= endDate) {
      const day = current.getDay();
      if (day !== 0 && day !== 6) count++;
      current.setDate(current.getDate() + 1);
    }
    return count;
  }

  function elapsedWorkingDays(start) {
    if (!start) return null;
    const startDate = new Date(start + 'T00:00:00');
    const today = new Date();
    today.setHours(0,0,0,0);
    if (today < startDate) return 0;
    let count = 0;
    const current = new Date(startDate);
    while (current <= today) {
      const day = current.getDay();
      if (day !== 0 && day !== 6) count++;
      current.setDate(current.getDate() + 1);
    }
    return count;
  }

  function getOverallProgress(stages) {
    const dates = stages.reduce((acc, s) => {
      if (s.startDate) acc.push(new Date(s.startDate));
      if (s.endDate) acc.push(new Date(s.endDate));
      return acc;
    }, []);
    if (dates.length === 0) return 0;
    const start = new Date(Math.min(...dates));
    const end = new Date(Math.max(...dates));
    const today = new Date();
    if (today < start) return 0;
    if (today > end) return 100;
    const total = end - start;
    const elapsed = today - start;
    return Math.round((elapsed / total) * 100);
  }

  // Функция для преобразования текста с форматированием в HTML
  function formatText(text) {
    if (!text) return '';
    
    // Экранируем HTML-спецсимволы, чтобы избежать XSS
    let escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    
    // Преобразуем маркированные списки (строки, начинающиеся с дефиса)
    const ulRegex = /(?:^|\n)- (.+?)(?=\n- |\n\n|$)/g;
    escaped = escaped.replace(ulRegex, (match, p1) => {
      const items = match.split('\n').map(line => {
        const itemMatch = line.match(/^- (.+)$/);
        return itemMatch ? itemMatch[1] : line;
      });
      return '<ul>' + items.map(item => `<li>${item}</li>`).join('') + '</ul>';
    });
    
    // Преобразуем нумерованные списки (строки, начинающиеся с цифры и точки)
    const olRegex = /(?:^|\n)\d+\. (.+?)(?=\n\d+\. |\n\n|$)/g;
    escaped = escaped.replace(olRegex, (match, p1) => {
      const items = match.split('\n').map(line => {
        const itemMatch = line.match(/^\d+\. (.+)$/);
        return itemMatch ? itemMatch[1] : line;
      });
      return '<ol>' + items.map(item => `<li>${item}</li>`).join('') + '</ol>';
    });
    
    // Жирный текст (**текст**)
    escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    
    // Курсив (*текст*)
    escaped = escaped.replace(/\*(.+?)\*/g, '<em>$1</em>');
    
    // Заменяем одиночные переносы строк на <br>, если они не внутри списков
    // Это упрощённо; для более точной обработки нужен парсер
    escaped = escaped.replace(/\n/g, '<br>');
    
    return escaped;
  }

  function getDetailText(stage) {
    if (stage.status === 'completed') return stage.summary || '—';
    if (stage.status === 'active') return stage.description || '—';
    return stage.nextActions || '—';
  }

  function formatDateRange(start, end) {
    if (!start || !end) return '';
    const startDate = new Date(start + 'T00:00:00');
    const endDate = new Date(end + 'T23:59:59');
    const startDay = startDate.getDate().toString().padStart(2,'0');
    const startMonth = (startDate.getMonth()+1).toString().padStart(2,'0');
    const startYear = startDate.getFullYear();
    const endDay = endDate.getDate().toString().padStart(2,'0');
    const endMonth = (endDate.getMonth()+1).toString().padStart(2,'0');
    const endYear = endDate.getFullYear();

    if (startYear !== endYear) {
      return `${startDay}.${startMonth}.${startYear} - ${endDay}.${endMonth}.${endYear}`;
    } else {
      return `${startDay}.${startMonth} - ${endDay}.${endMonth}.${endYear}`;
    }
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    const day = d.getDate().toString().padStart(2,'0');
    const month = (d.getMonth()+1).toString().padStart(2,'0');
    const year = d.getFullYear();
    return `${day}.${month}.${year}`;
  }

  function updateTimestamp() {
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('updateTime').textContent =
      `Обновлено ${pad(now.getDate())}.${pad(now.getMonth()+1)}.${now.getFullYear()}, ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  }

  // SVGs
  const phoneSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92Z"/></svg>';
  const waSvg='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.111.547 4.099 1.504 5.832L0 24l6.335-1.652A11.943 11.943 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818c-1.903 0-3.727-.528-5.313-1.527l-.38-.228-3.758.981.999-3.648-.25-.396A9.768 9.768 0 0 1 2.182 12c0-5.423 4.395-9.818 9.818-9.818S21.818 6.577 21.818 12s-4.395 9.818-9.818 9.818z"/></svg>';
  const tgSvg='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 1 0 24 12.056A12.01 12.01 0 0 0 11.944 0Zm5.654 8.26-1.97 9.293c-.146.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.334-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.832.928Z"/></svg>';
  const clockSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>';

  // Coordinator toggle
  const coordToggle = document.getElementById('coordToggle');
  const coordDropdown = document.getElementById('coordDropdown');
  if (coordToggle) {
    coordToggle.addEventListener('click', ()=>{
      coordToggle.classList.toggle('open');
      coordDropdown.classList.toggle('visible');
    });
    document.addEventListener('click', e=>{
      if (!coordToggle.contains(e.target) && !coordDropdown.contains(e.target)) {
        coordToggle.classList.remove('open');
        coordDropdown.classList.remove('visible');
      }
    });
  }

  function handleAvatarError(img) {
    const parent = img.parentNode;
    const initials = parent.getAttribute('data-initials') || '?';
    parent.innerHTML = initials;
  }

  let stickyObserver = null;
  function initSticky(count) {
    const header = document.getElementById('stickyHeader');
    if (count >= 5) {
      header.classList.add('is-sticky');
      if (!stickyObserver) {
        let sentinel = document.getElementById('stickySentinel');
        if (!sentinel) {
          sentinel = document.createElement('div');
          sentinel.id = 'stickySentinel';
          sentinel.style.cssText = 'height:1px;position:absolute;top:0;left:0;right:0;pointer-events:none;';
          header.parentNode.insertBefore(sentinel, header);
        }
        stickyObserver = new IntersectionObserver(
          ([e]) => header.classList.toggle('stuck', !e.isIntersecting),
          { threshold: 1, rootMargin: '-1px 0px 0px 0px' }
        );
        stickyObserver.observe(sentinel);
      }
    } else {
      header.classList.remove('is-sticky', 'stuck');
    }
  }

  function render(data) {
    // Если данные не загрузились, ничего не рендерим
    if (!data) return;
    
    // Показываем карточку, скрываем ошибку
    document.getElementById('caseCard').style.display = 'block';
    document.getElementById('errorContainer').style.display = 'none';
    
    document.getElementById('clientNameDisplay').textContent = data.clientName || '—';
    document.getElementById('caseTitleDisplay').textContent = data.caseName || '—';

    const exp = data.expert || {};
    if (exp.name) {
      coordToggle.style.display = '';
      const av = document.getElementById('coordAvatar');
      const initials = getInitials(exp.name);
      av.setAttribute('data-initials', initials);
      if (exp.avatar) {
        av.innerHTML = `<img src="${exp.avatar}" alt="${exp.name}" onerror="this.onerror=null; this.parentNode.innerHTML='${initials}';">`;
      } else {
        av.textContent = initials;
      }
      document.getElementById('coordName').textContent = exp.name;
      document.getElementById('coordRole').textContent = '';

      const c = document.getElementById('coordContacts');
      c.innerHTML = '';
      if (exp.phone) {
        const cl = exp.phone.replace(/[^\d+]/g, '');
        c.innerHTML += `<a class="contact-btn" href="tel:${cl}">${phoneSvg}<span>Позвонить</span></a>`;
        c.innerHTML += `<a class="contact-icon-btn" href="tel:${cl}" title="Позвонить">${phoneSvg}</a>`;
      }
      if (exp.telegram) {
        const tg = exp.telegram.replace('@','');
        c.innerHTML += `<a class="contact-btn" href="https://t.me/${tg}" target="_blank">${tgSvg}<span>Telegram</span></a>`;
        c.innerHTML += `<a class="contact-icon-btn" href="https://t.me/${tg}" target="_blank" title="Telegram">${tgSvg}</a>`;
      }
      if (exp.whatsapp) {
        const wa = exp.whatsapp.replace(/[^\d]/g, '');
        c.innerHTML += `<a class="contact-btn" href="https://wa.me/${wa}" target="_blank">${waSvg}<span>WhatsApp</span></a>`;
        c.innerHTML += `<a class="contact-icon-btn" href="https://wa.me/${wa}" target="_blank" title="WhatsApp">${waSvg}</a>`;
      }
    } else {
      coordToggle.style.display = 'none';
    }

    const stages = data.stages || [];
    const total = stages.length;
    const completedCount = stages.filter(s => s.status === 'completed').length;
    const activeIndex = stages.findIndex(s => s.status === 'active');
    const overallPercent = getOverallProgress(stages);
    document.getElementById('progressPercent').textContent = overallPercent + '%';
    document.getElementById('progressFill').style.width = overallPercent + '%';
    document.getElementById('progressLabel').textContent =
      `Этап ${completedCount + (activeIndex >= 0 ? 1 : 0)} из ${total}`;

    // Horizontal stages
    const hC = document.getElementById('stagesH');
    hC.innerHTML = '';
    stages.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = `stage-card-h ${s.status} stage-animate`;
      card.style.animationDelay = `${i*0.08}s`;

      const formattedDescription = formatText(getDetailText(s));
      
      let expectationsHtml = '';
      if (s.status === 'active' && s.nextActions) {
        expectationsHtml = `<div class="manager-comment"><div class="manager-comment-label">Ожидания от клиента</div>${formatText(s.nextActions)}</div>`;
      }

      let dateHtml = '';
      if (s.status === 'completed' && s.startDate && s.endDate) {
        dateHtml = `<div class="date-info">${clockSvg} ${formatDateRange(s.startDate, s.endDate)}</div>`;
      } else if (s.status === 'active') {
        const totalDays = countWorkingDays(s.startDate, s.endDate);
        const elapsed = elapsedWorkingDays(s.startDate);
        if (totalDays !== null && elapsed !== null) {
          dateHtml = `<div class="date-info">${clockSvg} в работе ${elapsed} из ${totalDays} дней</div>`;
        }
      } else if (s.status === 'pending' && s.startDate) {
        dateHtml = `<div class="date-info" style="color: var(--text-muted);">${clockSvg} ${formatDate(s.startDate)}</div>`;
      }

      let materialsHtml = '';
      if (s.materials) {
        materialsHtml = `<a href="${s.materials}" target="_blank" class="materials-link">📎 материалы</a>`;
      }

      card.innerHTML = `
        <div class="stage-number">${i+1}</div>
        <div class="stage-status-badge">${statusText(s.status)}</div>
        <div class="stage-title-h">${s.title}</div>
        <div class="stage-details-h">${formattedDescription}</div>
        <div class="stage-footer-h">
          ${expectationsHtml}
          ${materialsHtml}
          ${dateHtml}
        </div>
      `;

      hC.appendChild(card);
    });

    hC.classList.toggle('scrollable', stages.length >= 5);

    // Vertical stages
    const vC = document.getElementById('stagesV');
    vC.innerHTML = '';
    stages.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = `stage-v ${s.status} stage-animate`;
      el.style.animationDelay = `${i*0.08}s`;

      const formattedDescription = formatText(getDetailText(s));

      let expectationsHtml = '';
      if (s.status === 'active' && s.nextActions) {
        expectationsHtml = `<div class="manager-comment"><div class="manager-comment-label">Ожидания от клиента</div>${formatText(s.nextActions)}</div>`;
      }

      let dateHtml = '';
      if (s.status === 'completed' && s.startDate && s.endDate) {
        dateHtml = `<div class="date-info">${clockSvg} ${formatDateRange(s.startDate, s.endDate)}</div>`;
      } else if (s.status === 'active') {
        const totalDays = countWorkingDays(s.startDate, s.endDate);
        const elapsed = elapsedWorkingDays(s.startDate);
        if (totalDays !== null && elapsed !== null) {
          dateHtml = `<div class="date-info">${clockSvg} в работе ${elapsed} из ${totalDays} дней</div>`;
        }
      } else if (s.status === 'pending' && s.startDate) {
        dateHtml = `<div class="date-info" style="color: var(--text-muted);">${clockSvg} ${formatDate(s.startDate)}</div>`;
      }

      let materialsHtml = '';
      if (s.materials) {
        materialsHtml = `<a href="${s.materials}" target="_blank" class="materials-link">📎 материалы</a>`;
      }

      el.innerHTML = `
        <div class="stage-number">${i+1}</div>
        <div class="stage-v-body">
          <div class="stage-v-header">
            <div class="stage-status-badge">${statusText(s.status)}</div>
            <div class="stage-v-title">${s.title}</div>
          </div>
          <div class="stage-v-details">${formattedDescription}</div>
          <div class="stage-v-footer">
            ${expectationsHtml}
            ${materialsHtml}
            ${dateHtml}
          </div>
        </div>
      `;

      vC.appendChild(el);
    });

    initSticky(stages.length);
    updateTimestamp();
  }

  function hashData(d) { return JSON.stringify(d.stages?.map(s => s.status)); }

  async function fetchAndRender() {
    const data = await loadData();
    
    // Если данные не загрузились (ошибка), не продолжаем
    if (!data) return;
    
    const h = hashData(data);
    if (lastDataHash && h !== lastDataHash) {
      document.getElementById('caseCard').classList.add('flash-update');
      setTimeout(()=>document.getElementById('caseCard').classList.remove('flash-update'), 1500);
    }
    lastDataHash = h;
    render(data);
  }

  // Запускаем загрузку
  fetchAndRender();
  
  // Обновляем каждые 8 часов
  setInterval(fetchAndRender, 28800000); // 8 часов
})();
</script>
